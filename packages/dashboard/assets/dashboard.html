<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Durable · Workflow Runs</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #1c2128;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
        --green: #3fb950;
        --red: #f85149;
        --amber: #d29922;
        --purple: #bc8cff;
        --grey: #6e7681;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      code, .mono {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 12.5px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 22px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      header h1 {
        font-size: 16px;
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      header .dot { color: var(--accent); }
      .spacer { flex: 1; }
      main { padding: 22px; max-width: 1180px; margin: 0 auto; }
      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      select, input, button {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 11px;
        font-size: 13px;
      }
      button { cursor: pointer; transition: border-color 0.15s, background 0.15s; }
      button:hover { border-color: var(--accent); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
      button.primary:hover { background: #2a7fff; }
      button.danger:hover { border-color: var(--red); color: var(--red); }
      table { width: 100%; border-collapse: collapse; }
      th, td {
        text-align: left;
        padding: 9px 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      th {
        color: var(--muted);
        font-weight: 500;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      tbody tr { cursor: pointer; transition: background 0.1s; }
      tbody tr:hover { background: var(--panel); }
      .badge {
        display: inline-block;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 11.5px;
        font-weight: 600;
        text-transform: capitalize;
        border: 1px solid transparent;
      }
      .s-completed { color: var(--green); background: rgba(63,185,80,0.12); border-color: rgba(63,185,80,0.3); }
      .s-failed, .s-dead { color: var(--red); background: rgba(248,81,73,0.12); border-color: rgba(248,81,73,0.3); }
      .s-running, .s-pending { color: var(--accent); background: rgba(88,166,255,0.12); border-color: rgba(88,166,255,0.3); }
      .s-suspended { color: var(--amber); background: rgba(210,153,34,0.12); border-color: rgba(210,153,34,0.3); }
      .s-cancelled { color: var(--grey); background: rgba(110,118,129,0.15); border-color: rgba(110,118,129,0.3); }
      .muted { color: var(--muted); }
      .empty { color: var(--muted); padding: 40px; text-align: center; }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 18px 20px;
        margin-bottom: 18px;
      }
      .panel h2 { font-size: 14px; margin: 0 0 14px; font-weight: 600; }
      .kv { display: grid; grid-template-columns: 150px 1fr; gap: 6px 14px; }
      .kv dt { color: var(--muted); }
      .kv dd { margin: 0; word-break: break-word; }
      pre {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        overflow: auto;
        margin: 4px 0 0;
        max-height: 240px;
      }
      .timeline { display: flex; flex-direction: column; gap: 0; }
      .step {
        display: flex;
        gap: 14px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .step:last-child { border-bottom: none; }
      .step .marker { width: 10px; padding-top: 5px; }
      .step .marker .pip { width: 10px; height: 10px; border-radius: 50%; }
      .step .body { flex: 1; min-width: 0; }
      .step .row1 { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
      .step .name { font-weight: 600; }
      .step .meta { color: var(--muted); font-size: 12px; display: flex; gap: 14px; flex-wrap: wrap; margin-top: 4px; }
      .kind {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--purple);
        border: 1px solid rgba(188,140,255,0.3);
        background: rgba(188,140,255,0.1);
        border-radius: 4px;
        padding: 1px 6px;
      }
      .back { margin-bottom: 14px; display: inline-block; }
      .actions { display: flex; gap: 10px; margin: 14px 0 0; }
      .toast {
        position: fixed;
        bottom: 22px;
        right: 22px;
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        max-width: 360px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
      }
      .toast.show { opacity: 1; transform: translateY(0); }
      .toast.err { border-color: var(--red); }
      .health { display: flex; gap: 12px; flex-wrap: wrap; }
      .health .h-card {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 14px;
        background: var(--panel-2);
        font-size: 12.5px;
      }
      .health .h-card.stalled { border-color: var(--red); }
    </style>
  </head>
  <body>
    <header>
      <h1><span class="dot">●</span> Durable</h1>
      <span class="muted mono" id="crumb">runs</span>
      <span class="spacer"></span>
      <span class="muted" id="health-strip"></span>
    </header>
    <main id="app"><div class="empty">Loading…</div></main>
    <div class="toast" id="toast"></div>

    <script>
      // The API base path is injected by the provider at serve time.
      const API_BASE = '__API_BASE__';

      const el = (tag, attrs = {}, children = []) => {
        const n = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (k === 'class') n.className = v;
          else if (k === 'html') n.innerHTML = v;
          else if (k.startsWith('on') && typeof v === 'function') n.addEventListener(k.slice(2), v);
          else if (v != null) n.setAttribute(k, v);
        }
        for (const c of [].concat(children)) {
          if (c == null) continue;
          n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
        }
        return n;
      };

      const toast = (msg, isErr) => {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast show' + (isErr ? ' err' : '');
        setTimeout(() => { t.className = 'toast'; }, 3200);
      };

      const api = async (path, opts) => {
        const res = await fetch(API_BASE + path, {
          headers: { 'Content-Type': 'application/json' },
          ...opts,
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || ('HTTP ' + res.status));
        return body;
      };

      const badge = (status) =>
        el('span', { class: 'badge s-' + status }, status);

      const fmt = (iso) => {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleString();
      };
      const dur = (ms) => {
        if (ms == null) return '—';
        if (ms < 1000) return ms + 'ms';
        if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
        return (ms / 60000).toFixed(1) + 'm';
      };

      const PIP = {
        completed: 'var(--green)', failed: 'var(--red)', running: 'var(--accent)',
        pending: 'var(--accent)', suspended: 'var(--amber)', cancelled: 'var(--grey)',
        dead: 'var(--red)',
      };

      let state = { status: '', workflow: '' };

      async function refreshHealth() {
        try {
          const { groups } = await api('/health');
          const strip = document.getElementById('health-strip');
          if (!groups.length) { strip.textContent = ''; return; }
          const stalled = groups.filter((g) => g.stalled).length;
          strip.innerHTML = stalled
            ? '<span style="color:var(--red)">⚠ ' + stalled + ' stalled group(s)</span>'
            : groups.length + ' worker group(s)';
        } catch (_) { /* health is best-effort */ }
      }

      async function renderList() {
        document.getElementById('crumb').textContent = 'runs';
        const app = document.getElementById('app');
        const params = new URLSearchParams();
        if (state.status) params.set('status', state.status);
        if (state.workflow) params.set('workflow', state.workflow);
        let data;
        try {
          data = await api('/runs?' + params.toString());
        } catch (e) {
          app.innerHTML = '';
          app.appendChild(el('div', { class: 'empty' }, 'Failed to load runs: ' + e.message));
          return;
        }

        const statusSel = el('select', {
          onchange: (e) => { state.status = e.target.value; renderList(); },
        }, [el('option', { value: '' }, 'All statuses')].concat(
          data.statuses.map((s) =>
            el('option', { value: s, ...(s === state.status ? { selected: '' } : {}) }, s)),
        ));

        const wfInput = el('input', {
          placeholder: 'Filter by workflow…',
          value: state.workflow,
          onkeydown: (e) => { if (e.key === 'Enter') { state.workflow = e.target.value.trim(); renderList(); } },
        });

        const controls = el('div', { class: 'controls' }, [
          statusSel,
          wfInput,
          el('button', { onclick: () => renderList() }, '↻ Refresh'),
        ]);

        const rows = data.runs.map((r) =>
          el('tr', { onclick: () => navigate(r.id) }, [
            el('td', {}, el('code', {}, r.id)),
            el('td', {}, r.workflow + (r.workflowVersion ? ' @' + r.workflowVersion : '')),
            el('td', {}, badge(r.status)),
            el('td', { class: 'muted mono' }, fmt(r.createdAt)),
            el('td', { class: 'muted mono' }, fmt(r.updatedAt)),
          ]));

        const table = el('table', {}, [
          el('thead', {}, el('tr', {}, [
            el('th', {}, 'Run id'), el('th', {}, 'Workflow'),
            el('th', {}, 'Status'), el('th', {}, 'Started'), el('th', {}, 'Updated'),
          ])),
          el('tbody', {}, rows.length ? rows : []),
        ]);

        app.innerHTML = '';
        app.appendChild(controls);
        if (rows.length) app.appendChild(table);
        else app.appendChild(el('div', { class: 'empty' }, 'No runs match.'));
      }

      async function renderDetail(id) {
        document.getElementById('crumb').textContent = 'runs / ' + id;
        const app = document.getElementById('app');
        let data;
        try {
          data = await api('/runs/' + encodeURIComponent(id));
        } catch (e) {
          app.innerHTML = '';
          app.appendChild(el('a', { class: 'back', href: '#' }, '← back'));
          app.appendChild(el('div', { class: 'empty' }, e.message));
          return;
        }
        const run = data.run;

        const canRetry = ['failed', 'dead', 'cancelled', 'suspended'].includes(run.status);
        const canCancel = ['pending', 'running', 'suspended'].includes(run.status);

        const actions = el('div', { class: 'actions' }, [
          el('button', {
            class: 'primary', disabled: canRetry ? null : '',
            onclick: () => act('retry', id),
          }, '↻ Retry'),
          el('button', {
            class: 'danger', disabled: canCancel ? null : '',
            onclick: () => act('cancel', id),
          }, '✕ Cancel'),
        ]);

        const overview = el('div', { class: 'panel' }, [
          el('h2', {}, 'Overview'),
          el('dl', { class: 'kv' }, [
            el('dt', {}, 'Status'), el('dd', {}, badge(run.status)),
            el('dt', {}, 'Workflow'), el('dd', {}, run.workflow + ' @' + run.workflowVersion),
            el('dt', {}, 'Run id'), el('dd', {}, el('code', {}, run.id)),
            el('dt', {}, 'Tags'), el('dd', { class: 'muted' }, (run.tags || []).join(', ') || '—'),
            el('dt', {}, 'Started'), el('dd', { class: 'mono muted' }, fmt(run.createdAt)),
            el('dt', {}, 'Updated'), el('dd', { class: 'mono muted' }, fmt(run.updatedAt)),
          ]),
          actions,
          run.input !== undefined ? el('div', {}, [
            el('div', { class: 'muted', style: 'margin-top:14px' }, 'Input'),
            el('pre', {}, el('code', {}, JSON.stringify(run.input, null, 2))),
          ]) : null,
          run.error ? el('div', {}, [
            el('div', { class: 'muted', style: 'margin-top:14px;color:var(--red)' }, 'Error'),
            el('pre', {}, el('code', {}, JSON.stringify(run.error, null, 2))),
          ]) : null,
          run.output !== undefined && run.output !== null ? el('div', {}, [
            el('div', { class: 'muted', style: 'margin-top:14px' }, 'Output'),
            el('pre', {}, el('code', {}, JSON.stringify(run.output, null, 2))),
          ]) : null,
        ]);

        const steps = data.timeline.map((cp) =>
          el('div', { class: 'step' }, [
            el('div', { class: 'marker' },
              el('div', { class: 'pip', style: 'background:' + (PIP[cp.status] || 'var(--grey)') })),
            el('div', { class: 'body' }, [
              el('div', { class: 'row1' }, [
                el('span', { class: 'name' }, cp.name),
                el('span', { class: 'kind' }, cp.kind),
                badge(cp.status),
              ]),
              el('div', { class: 'meta' }, [
                el('span', {}, 'attempts: ' + cp.attempts),
                el('span', {}, 'duration: ' + dur(cp.durationMs)),
                cp.queueMs ? el('span', {}, 'queued: ' + dur(cp.queueMs)) : null,
                cp.workerGroup ? el('span', {}, 'group: ' + cp.workerGroup) : null,
                el('span', { class: 'mono' }, fmt(cp.startedAt)),
              ]),
              cp.error ? el('pre', {}, el('code', {}, JSON.stringify(cp.error, null, 2))) : null,
            ]),
          ]));

        const timeline = el('div', { class: 'panel' }, [
          el('h2', {}, 'Timeline (' + data.timeline.length + ' steps)'),
          steps.length ? el('div', { class: 'timeline' }, steps)
            : el('div', { class: 'muted' }, 'No checkpoints yet.'),
        ]);

        const childrenPanel = data.children.length ? el('div', { class: 'panel' }, [
          el('h2', {}, 'Children'),
          el('div', {}, data.children.map((c) =>
            el('div', {}, el('a', { href: '#', onclick: (e) => { e.preventDefault(); navigate(c); } },
              el('code', {}, c))))),
        ]) : null;

        app.innerHTML = '';
        app.appendChild(el('a', {
          class: 'back', href: '#',
          onclick: (e) => { e.preventDefault(); navigate(''); },
        }, '← all runs'));
        app.appendChild(overview);
        app.appendChild(timeline);
        if (childrenPanel) app.appendChild(childrenPanel);
      }

      async function act(action, id) {
        try {
          await api('/runs/' + encodeURIComponent(id) + '/' + action, {
            method: 'POST',
            body: JSON.stringify({}),
          });
          toast(action === 'retry' ? 'Run re-enqueued' : 'Run cancelled');
          setTimeout(() => renderDetail(id), 250);
        } catch (e) {
          toast('Failed: ' + e.message, true);
        }
      }

      function navigate(id) {
        location.hash = id ? '/runs/' + id : '';
      }

      function route() {
        const hash = location.hash.replace(/^#/, '');
        const m = /^\/runs\/(.+)$/.exec(hash);
        if (m) renderDetail(decodeURIComponent(m[1]));
        else renderList();
        refreshHealth();
      }

      window.addEventListener('hashchange', route);
      route();
    </script>
  </body>
</html>
