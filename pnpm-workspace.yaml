packages:
  - "packages/*"
# pnpm >= 10 nao roda build script de dependencia sem permissao explicita, e em CI ele
# ERRA (ERR_PNPM_IGNORED_BUILDS) em vez de so avisar -- o release morre no
# `pnpm install --frozen-lockfile` antes de chegar no changesets. Todos estes ja rodavam
# sob o pnpm 9 (biome/swc/esbuild/better-sqlite3/sharp compilam ou baixam binario), entao
# liberar preserva o comportamento; nao e permissao nova.
allowBuilds:
  '@biomejs/biome': true
  '@swc/core': true
  better-sqlite3: true
  esbuild: true
  msgpackr-extract: set this to true or false
# bullmq pulls in msgpackr-extract (native build for a JS-fallback accelerator we don't need).
# pnpm >=10 ERRORS in CI on an *un-acknowledged* ignored build; listing it here says "skipping
# its build is intentional" so `pnpm install --frozen-lockfile` stays green.
ignoredBuiltDependencies:
  - msgpackr-extract
